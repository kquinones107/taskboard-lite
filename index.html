<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBoard Lite</title>

    <link rel="stylesheet" href="./src/css/base.css" />
    <link rel="stylesheet" href="./src/css/alumno-a.css" />
    <link rel="stylesheet" href="./src/css/alumno-b.css" />
    <link rel="stylesheet" href="./src/css/app.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__content">
        <div class="app-brand">
          <h1 class="app-title">TaskBoard Lite</h1>
          <p class="app-subtitle">
            Tablero Kanban para gestión de tareas
          </p>
        </div>

        <div class="app-actions">
          <button id="openTaskModalBtn" class="btn btn-primary" type="button">
            + Nueva tarea
          </button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="board-section">
        <div class="board" id="board">
          <article class="board-column" id="todo-column" data-status="todo">
            <div class="board-column__header">
              <h2 class="board-column__title">Pendiente</h2>
              <span class="board-column__count" id="todo-count">0</span>
            </div>

            <div class="board-column__tasks" id="todo-tasks">
              <!-- Aquí se renderizan las tareas pendientes -->
            </div>
          </article>

          <article
            class="board-column"
            id="in-progress-column"
            data-status="in-progress"
          >
            <div class="board-column__header">
              <h2 class="board-column__title">En progreso</h2>
              <span class="board-column__count" id="in-progress-count">0</span>
            </div>

            <div class="board-column__tasks" id="in-progress-tasks">
              <!-- Aquí se renderizan las tareas en progreso -->
            </div>
          </article>

          <article class="board-column" id="done-column" data-status="done">
            <div class="board-column__header">
              <h2 class="board-column__title">Hecho</h2>
              <span class="board-column__count" id="done-count">0</span>
            </div>

            <div class="board-column__tasks" id="done-tasks">
              <!-- Aquí se renderizan las tareas completadas -->
            </div>
          </article>
        </div>
      </section>
    </main>

    <section
      class="modal hidden"
      id="taskModal"
      aria-hidden="true"
      role="dialog"
      aria-labelledby="taskModalTitle"
    >
      <div class="modal__overlay" id="modalOverlay"></div>

      <div class="modal__container">
        <div class="modal__header">
          <h2 id="taskModalTitle">Nueva tarea</h2>
          <button
            id="closeTaskModalBtn"
            class="btn btn-icon"
            type="button"
            aria-label="Cerrar modal"
          >
            ×
          </button>
        </div>

        <form id="taskForm" class="task-form">
          <div class="form-group">
            <label for="taskTitle">Título</label>
            <input
              type="text"
              id="taskTitle"
              name="title"
              placeholder="Ej: Diseñar tarjetas del tablero"
              required
            />
          </div>

          <div class="form-group">
            <label for="taskDescription">Descripción</label>
            <textarea
              id="taskDescription"
              name="description"
              rows="4"
              placeholder="Describe la tarea..."
            ></textarea>
          </div>

          <div class="form-group">
            <label for="taskStatus">Estado</label>
            <select id="taskStatus" name="status">
              <option value="todo">Pendiente</option>
              <option value="in-progress">En progreso</option>
              <option value="done">Hecho</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskPriority">Prioridad</label>
            <select id="taskPriority" name="priority">
              <option value="low">Baja</option>
              <option value="medium">Media</option>
              <option value="high">Alta</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskDueDate">Fecha límite</label>
            <input type="date" id="taskDueDate" name="dueDate" />
          </div>

          <div class="form-actions">
            <button type="button" id="cancelTaskBtn" class="btn btn-secondary">
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary">
              Guardar tarea
            </button>
          </div>
        </form>
      </div>
    </section>

    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
